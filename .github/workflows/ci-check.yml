name: CI Checks / 质量检查

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Validate Markdown structure
        run: python scripts/validate_structure.py

      - name: Check bilingual content
        run: python scripts/validate_bilingual.py

      - name: Verify SQLite sync
        run: python scripts/verify_db_sync.py

      - name: Build website data smoke test
        run: |
          python scripts/export_website_data.py --output-dir /tmp/website-data
          python scripts/build_website_stats.py --output /tmp/website-stats.json
          python scripts/build_search_index.py --output /tmp/website-search-index.json
